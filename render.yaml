services:
  - type: web
    name: wedding-app-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.9.0
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_WEDDING_DATE
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_LAT
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_LNG
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_VENUE_NAME
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_DATE_DISPLAY
        sync: false
      - key: NEXT_PUBLIC_CEREMONY_TIME
        sync: false
